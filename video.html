<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>POLYTECHNIC HUB | Video Library</title>

<meta name="theme-color" content="#0F172A">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#EEF4FF;

color:#111827;

overflow-x:hidden;

}

::-webkit-scrollbar{

width:8px;

}

::-webkit-scrollbar-thumb{

background:#2563EB;

border-radius:20px;

}

header{

width:100%;

height:70px;

background:#2563EB;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 18px;

position:fixed;

left:0;

top:0;

z-index:99999;

box-shadow:0 3px 12px rgba(0,0,0,.18);

}

.logo{

display:flex;

align-items:center;

gap:10px;

color:white;

font-size:21px;

font-weight:700;

}

.logo img{

width:42px;

height:42px;

border-radius:50%;

background:white;

padding:5px;

}

.header-right{

display:flex;

align-items:center;

gap:15px;

}

.icon-btn{

width:42px;

height:42px;

display:flex;

align-items:center;

justify-content:center;

background:rgba(255,255,255,.15);

border-radius:50%;

cursor:pointer;

transition:.3s;

}

.icon-btn:hover{

background:white;

color:#2563EB;

}

.search-area{

margin-top:85px;

padding:15px;

}

.search-box{

background:white;

border-radius:14px;

display:flex;

align-items:center;

padding:0 15px;

height:58px;

box-shadow:0 5px 18px rgba(0,0,0,.08);

}

.search-box input{

width:100%;

height:100%;

border:none;

outline:none;

font-size:17px;

padding-left:12px;

background:transparent;

}

.filter-row{

display:flex;

gap:12px;

overflow:auto;

padding-top:15px;

}

.filter-btn{

white-space:nowrap;

border:none;

padding:10px 18px;

border-radius:50px;

background:white;

font-weight:600;

cursor:pointer;

transition:.3s;

box-shadow:0 3px 10px rgba(0,0,0,.08);

}

.filter-btn:hover{

background:#2563EB;

color:white;

}

.banner{

margin:18px 15px;

height:170px;

border-radius:18px;

background:linear-gradient(135deg,#2563EB,#0F172A);

display:flex;

align-items:center;

justify-content:space-between;

padding:25px;

color:white;

overflow:hidden;

position:relative;

}

.banner::before{

content:"";

position:absolute;

right:-50px;

top:-50px;

width:200px;

height:200px;

background:rgba(255,255,255,.08);

border-radius:50%;

}

.banner h2{

font-size:28px;

font-weight:700;

margin-bottom:8px;

}

.banner p{

font-size:15px;

opacity:.9;

line-height:28px;

}

.banner img{

width:120px;

z-index:2;

}

.section-title{

padding:10px 18px;

font-size:23px;

font-weight:700;

}

#videoContainer{

padding:15px;

display:grid;

grid-template-columns:repeat(auto-fill,minmax(330px,1fr));

gap:22px;

}

.video-card{

background:white;

border-radius:18px;

overflow:hidden;

box-shadow:0 8px 18px rgba(0,0,0,.08);

transition:.35s;

cursor:pointer;

}

.video-card:hover{

transform:translateY(-6px);

}

.thumbnail{

width:100%;

height:215px;

overflow:hidden;

background:#ddd;

position:relative;

}

.thumbnail img{

width:100%;

height:100%;

object-fit:cover;

transition:.4s;

}

.video-card:hover .thumbnail img{

transform:scale(1.08);

}

.play-icon{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

width:70px;

height:70px;

border-radius:50%;

background:rgba(255,255,255,.92);

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

color:red;

}

.video-content{

padding:18px;

}

.video-title{

font-size:20px;

font-weight:700;

line-height:31px;

margin-bottom:12px;

}

.video-date{

font-size:14px;

color:#6B7280;

margin-bottom:15px;

}

.watch-btn{

width:100%;

height:48px;

border:none;

background:#2563EB;

color:white;

border-radius:10px;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.3s;

}

.watch-btn:hover{

background:#1D4ED8;

}

#playerModal{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

background:rgba(0,0,0,.92);

display:none;

align-items:center;

justify-content:center;

z-index:999999;

}

.player{

width:95%;

max-width:1100px;

background:#000;

border-radius:18px;

overflow:hidden;

}

.player-top{

height:60px;

background:#111827;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 18px;

color:white;

font-size:18px;

font-weight:600;

}

.closePlayer{

font-size:32px;

cursor:pointer;

}

.player iframe{

width:100%;

aspect-ratio:16/9;

border:none;

display:block;

}
  @media(max-width:992px){

#videoContainer{

grid-template-columns:repeat(auto-fill,minmax(300px,1fr));

}

.banner{

height:160px;

}

.banner h2{

font-size:24px;

}

}

@media(max-width:768px){

header{

height:65px;

padding:0 12px;

}

.logo{

font-size:18px;

}

.logo img{

width:36px;

height:36px;

}

.search-area{

margin-top:78px;

padding:12px;

}

.banner{

height:auto;

flex-direction:column;

align-items:flex-start;

gap:15px;

padding:20px;

}

.banner img{

width:90px;

align-self:flex-end;

}

.section-title{

font-size:20px;

}

#videoContainer{

grid-template-columns:1fr;

padding:12px;

gap:18px;

}

.thumbnail{

height:210px;

}

.video-title{

font-size:18px;

line-height:28px;

}

}

.loading{

width:100%;

padding:80px 20px;

text-align:center;

font-size:20px;

font-weight:600;

color:#2563EB;

}

.empty{

width:100%;

padding:80px 20px;

text-align:center;

font-size:20px;

font-weight:600;

color:#6B7280;

}

</style>

</head>

<body>

<header>

<div class="logo">

<img src="images/logo.png">

<span>POLYTECHNIC HUB</span>

</div>

<div class="header-right">

<div class="icon-btn">

🔔

</div>

<div class="icon-btn">

👤

</div>

</div>

</header>

<div class="search-area">

<div class="search-box">

<span style="font-size:22px;">🔍</span>

<input
type="text"
id="searchBox"
placeholder="Search Videos...">

</div>

<div class="filter-row">

<button class="filter-btn">All</button>

<button class="filter-btn">Latest</button>

<button class="filter-btn">Electrical</button>

<button class="filter-btn">Civil</button>

<button class="filter-btn">Mechanical</button>

<button class="filter-btn">Computer</button>

<button class="filter-btn">Electronics</button>

</div>

</div>

<div class="banner">

<div>

<h2>POLYTECHNIC HUB</h2>

<p>

Watch All Polytechnic Videos Free

Anywhere • Anytime • Mobile Friendly

</p>

</div>

<img src="images/video.png">

</div>

<h2 class="section-title">

Latest Videos

</h2>

<div
id="videoContainer">

<div class="loading">

Loading Videos...

</div>

</div>

<div id="playerModal">

<div class="player">

<div class="player-top">

<span id="videoTitle">

Loading...

</span>

<span
class="closePlayer"
id="closePlayer">

&times;

</span>

</div>

<iframe

id="youtubePlayer"

allowfullscreen

allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share">

</iframe>

</div>

</div>

<script>

const SUPABASE_URL="https://kdjouagibqusxdwsebhx.supabase.co";

const SUPABASE_KEY="sb_publishable_uN83f82g2EOYny5m9ZiQAw_xKaYxAS7";

const supabase=window.supabase.createClient(

SUPABASE_URL,

SUPABASE_KEY

);

const container=document.getElementById("videoContainer");

const searchBox=document.getElementById("searchBox");

const modal=document.getElementById("playerModal");

const player=document.getElementById("youtubePlayer");

const closePlayer=document.getElementById("closePlayer");

const videoTitle=document.getElementById("videoTitle");

let videos=[];

let filteredVideos=[];
  async function loadVideos(){

const {data,error}=await supabase

.from("videos")

.select("*")

.order("created_at",{ascending:false});

if(error){

container.innerHTML=`

<div class="empty">

Unable to Load Videos

</div>

`;

return;

}

videos=data;

filteredVideos=data;

renderVideos(filteredVideos);

}

function renderVideos(list){

container.innerHTML="";

if(list.length===0){

container.innerHTML=`

<div class="empty">

No Videos Found

</div>

`;

return;

}

list.forEach(video=>{

const id=getYoutubeId(video.youtube_url);

const thumb=`https://img.youtube.com/vi/${id}/hqdefault.jpg`;

container.innerHTML+=`

<div class="video-card">

<div class="thumbnail">

<img src="${thumb}">

<div class="play-icon">

▶

</div>

</div>

<div class="video-content">

<div class="video-title">

${video.title}

</div>

<div class="video-date">

${new Date(video.created_at).toLocaleDateString()}

</div>

<button

class="watch-btn"

onclick="playVideo('${id}','${video.title.replace(/'/g,"")}')">

Watch Video

</button>

</div>

</div>

`;

});

}

function getYoutubeId(url){

if(url.includes("watch?v="))

return url.split("watch?v=")[1].split("&")[0];

if(url.includes("youtu.be/"))

return url.split("youtu.be/")[1].split("?")[0];

if(url.includes("/shorts/"))

return url.split("/shorts/")[1].split("?")[0];

return url;

}

function playVideo(id,title){

videoTitle.innerText=title;

player.src="https://www.youtube.com/embed/"+id+"?autoplay=1";

modal.style.display="flex";

document.body.style.overflow="hidden";

}

closePlayer.onclick=function(){

modal.style.display="none";

player.src="";

document.body.style.overflow="auto";

}

modal.onclick=function(e){

if(e.target===modal){

modal.style.display="none";

player.src="";

document.body.style.overflow="auto";

}

}

searchBox.addEventListener("keyup",function(){

const keyword=this.value.toLowerCase();

filteredVideos=videos.filter(video=>

video.title.toLowerCase().includes(keyword)

);

renderVideos(filteredVideos);

});

loadVideos();
  document.querySelectorAll(".filter-btn").forEach(button=>{

button.addEventListener("click",()=>{

document.querySelectorAll(".filter-btn").forEach(btn=>{

btn.style.background="white";

btn.style.color="#111827";

});

button.style.background="#2563EB";

button.style.color="white";

const value=button.innerText.toLowerCase();

if(value==="all"){

filteredVideos=videos;

renderVideos(filteredVideos);

return;

}

if(value==="latest"){

filteredVideos=[...videos].sort((a,b)=>

new Date(b.created_at)-new Date(a.created_at)

);

renderVideos(filteredVideos);

return;

}

filteredVideos=videos.filter(video=>{

const title=(video.title||"").toLowerCase();

const branch=(video.branch||"").toLowerCase();

const subject=(video.subject||"").toLowerCase();

return title.includes(value) ||

branch.includes(value) ||

subject.includes(value);

});

renderVideos(filteredVideos);

});

});

window.addEventListener("keydown",e=>{

if(e.key==="Escape"){

modal.style.display="none";

player.src="";

document.body.style.overflow="auto";

}

});

window.addEventListener("online",()=>{

loadVideos();

});

window.addEventListener("focus",()=>{

loadVideos();

});

setInterval(()=>{

loadVideos();

},30000);

window.addEventListener("load",()=>{

loadVideos();

});

</script>

</body>

</html>
