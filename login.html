<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polytechnic Hub - Admin Login</title>
    <style>
        /* ==========================================================================
           CSS Variables & Reset
           ========================================================================== */
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            /* Disable Selection as requested */
            user-select: none; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        /* Allow selection in inputs */
        input {
            user-select: auto;
            -webkit-user-select: auto;
            -moz-user-select: auto;
            -ms-user-select: auto;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ==========================================================================
           Animated Background Elements
           ========================================================================== */
        .bg-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 20s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #3b82f6;
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: #8b5cf6;
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 300px;
            height: 300px;
            background: #0ea5e9;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* ==========================================================================
           Glassmorphism Login Container
           ========================================================================== */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            background: var(--glass-bg);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.6s ease-out forwards;
        }

        @keyframes slideUpFade {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .logo-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ==========================================================================
           Form Elements
           ========================================================================== */
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: 0.3s ease;
        }

        .form-control {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.9rem 1rem 0.9rem 3rem;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-control:focus + .input-icon,
        .form-control:not(:placeholder-shown) + .input-icon {
            fill: var(--primary);
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            color: var(--text-muted);
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: 0.3s;
        }

        .toggle-password:hover svg {
            fill: var(--text-main);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .remember-me input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .forgot-password:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* ==========================================================================
           Button & Loading Spinner
           ========================================================================== */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==========================================================================
           Toast Notifications
           ========================================================================== */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            min-width: 300px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }

        .toast-icon {
            width: 24px;
            height: 24px;
        }

        .toast.success .toast-icon { fill: var(--success); }
        .toast.error .toast-icon { fill: var(--error); }

        /* Disable image dragging globally */
        img, svg {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
        }
        
        /* Initial Loader for Auth state check */
        #initialLoader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <!-- Global App Initializing Loader -->
    <div id="initialLoader">
        <div class="spinner" style="display: block; width: 40px; height: 40px; border-width: 4px;"></div>
    </div>

    <!-- Animated Background Shapes -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Toast Notification Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Main Login Glass Container -->
    <div class="login-container" id="loginWrapper" style="display: none;">
        <div class="header">
            <div class="logo-icon">
                <!-- Academic Cap SVG -->
                <svg viewBox="0 0 24 24">
                    <path d="M12 3L1 9L5 11.18V17.18L12 21L19 17.18V11.18L21 10.09V17H23V9L12 3ZM18.82 9L12 12.72L5.18 9L12 5.28L18.82 9ZM17 15.99L12 18.72L7 15.99V12.27L12 15L17 12.27V15.99Z"/>
                </svg>
            </div>
            <h1>POLYTECHNIC HUB</h1>
            <p>Admin Portal Login</p>
        </div>

        <form id="loginForm">
            <!-- Email Field -->
            <div class="input-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-control" placeholder="admin@polytechnic.edu" required autocomplete="email">
                    <!-- Mail Icon -->
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M3 3H21C21.5523 3 22 3.44772 22 4V20C22 20.5523 21.5523 21 21 21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3ZM20 7.23792L12.0718 14.338L4 7.21594V19H20V7.23792ZM4.51146 5L12.0619 11.662L19.501 5H4.51146Z"/>
                    </svg>
                </div>
            </div>

            <!-- Password Field -->
            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    <!-- Lock Icon -->
                    <svg class="input-icon" viewBox="0 0 24 24">
                        <path d="M18 8H20C20.5523 8 21 8.44772 21 9V21C21 21.5523 20.5523 22 20 22H4C3.44772 22 3 21.5523 3 21V9C3 8.44772 3.44772 8 4 8H6V7C6 3.68629 8.68629 1 12 1C15.3137 1 18 3.68629 18 7V8ZM16 8V7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7V8H16ZM12 16.5C11.1716 16.5 10.5 15.8284 10.5 15C10.5 14.1716 11.1716 13.5 12 13.5C12.8284 13.5 13.5 14.1716 13.5 15C13.5 15.8284 12.8284 16.5 12 16.5Z"/>
                    </svg>
                    <!-- Toggle Visibility Icon -->
                    <button type="button" class="toggle-password" id="togglePassword" title="Show/Hide Password">
                        <svg id="eyeIcon" viewBox="0 0 24 24">
                            <path d="M12 3C17.5 3 21.5 7.5 23 12C21.5 16.5 17.5 21 12 21C6.5 21 2.5 16.5 1 12C2.5 7.5 6.5 3 12 3ZM12 19C16.31 19 19.69 15.54 21 12C19.69 8.46 16.31 5 12 5C7.69 5 4.31 8.46 3 12C4.31 15.54 7.69 19 12 19ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15Z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe" checked>
                    <span>Remember Me</span>
                </label>
                <a href="#" class="forgot-password" id="forgotPasswordBtn">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                <span id="btnText">Sign In Securely</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
        </form>
    </div>

    <!-- Firebase & Application Logic -->
    <script type="module">
        // 1. Firebase Initialization (Exact SDK & Config requested)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import {
            getAuth,
            signInWithEmailAndPassword,
            onAuthStateChanged,
            setPersistence,
            browserLocalPersistence,
            browserSessionPersistence
        } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA0V8VbtBSoBu2Ya2ypQiGNtk1cDpzp70U",
            authDomain: "polytechnic-hub-82685.firebaseapp.com",
            projectId: "polytechnic-hub-82685",
            storageBucket: "polytechnic-hub-82685.firebasestorage.app",
            messagingSenderId: "609741840575",
            appId: "1:609741840575:web:a93e4806e9c621fdad660a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 2. DOM Elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const toastContainer = document.getElementById('toastContainer');
        const initialLoader = document.getElementById('initialLoader');
        const loginWrapper = document.getElementById('loginWrapper');
        const forgotPasswordBtn = document.getElementById('forgotPasswordBtn');

        // 3. Security Restrictions (Frontend Safeguards)
        document.addEventListener('contextmenu', e => e.preventDefault()); // Disable Right Click
        
        document.addEventListener('keydown', (e) => {
            // Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
            }
        });

        // 4. UI Interactions
        
        // Show/Hide Password
        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                eyeIcon.innerHTML = `<path d="M12 3C17.5 3 21.5 7.5 23 12C21.5 16.5 17.5 21 12 21C6.5 21 2.5 16.5 1 12C2.5 7.5 6.5 3 12 3ZM12 19C16.31 19 19.69 15.54 21 12C19.69 8.46 16.31 5 12 5C7.69 5 4.31 8.46 3 12C4.31 15.54 7.69 19 12 19ZM12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15Z"/><path d="M2 2L22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>`;
            } else {
                eyeIcon.innerHTML = `<path d="M12 3C17.5 3 21.5 7.5 23 12C21.5 16.5 17.5 21 12 21C6.5 21 2.5 16.5 1 12C2.5 7.5 6.5 3 12 3ZM12 19C16.31 19 19.69 15.54 21 12C19.69 8.46 16.31 5 12 5C7.69 5 4.31 8.46 3 12C4.31 15.54 7.69 19 12 19ZM12 17C9.24 17 7 14.76 7 12C7 9.24 9.24 7 12 7C14.76 7 17 9.24 17 12C17 14.76 14.76 17 12 17ZM12 15C13.66 15 15 13.66 15 12C15 10.34 13.66 9 12 9C10.34 9 9 10.34 9 12C9 13.66 10.34 15 12 15Z"/>`;
            }
        });

        // Toast Notification System
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const iconSvg = type === 'success' 
                ? `<svg class="toast-icon" viewBox="0 0 24 24"><path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM11.0026 16L18.0737 8.92893L16.6595 7.51472L11.0026 13.1716L8.17421 10.3431L6.76 11.7574L11.0026 16Z"/></svg>`
                : `<svg class="toast-icon" viewBox="0 0 24 24"><path d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM11 15V17H13V15H11ZM11 7V13H13V7H11Z"/></svg>`;

            toast.innerHTML = `
                ${iconSvg}
                <span>${message}</span>
            `;
            
            toastContainer.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after 3.5 seconds
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400); // Wait for transition
            }, 3500);
        }

        // Dummy forgot password trigger
        forgotPasswordBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showToast('Password reset link will be sent to administrators.', 'error');
        });

        // 5. Firebase Authentication Logic
        
        // Auto-login Check
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in, redirect automatically
                showToast('Session restored. Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'admin/dashboard.html';
                }, 1000);
            } else {
                // No user is signed in, hide loader and show form
                initialLoader.style.opacity = '0';
                setTimeout(() => {
                    initialLoader.style.display = 'none';
                    loginWrapper.style.display = 'block';
                }, 500);
            }
        });

        // Form Submit
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            const remember = rememberMeCheckbox.checked;

            // UI Loading state
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';

            try {
                // Set Session Persistence based on Remember Me check
                const persistenceType = remember ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);

                // Authenticate
                await signInWithEmailAndPassword(auth, email, password);
                
                showToast('Authentication successful. Redirecting...', 'success');
                // Note: The onAuthStateChanged listener above will also catch this and redirect, 
                // but we can explicitly redirect here as well for immediate UX.
                setTimeout(() => {
                    window.location.href = 'admin/dashboard.html';
                }, 1200);

            } catch (error) {
                // Error handling and user-friendly messages
                let errorMessage = 'An error occurred during login.';
                
                switch(error.code) {
                    case 'auth/invalid-credential':
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                        errorMessage = 'Invalid email or password.';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Too many failed attempts. Try again later.';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Network error. Please check your connection.';
                        break;
                    default:
                        errorMessage = error.message;
                }

                showToast(errorMessage, 'error');
                
                // Reset UI
                submitBtn.disabled = false;
                btnText.style.display = 'inline-block';
                btnSpinner.style.display = 'none';
            }
        });

    </script>
</body>
</html>
